<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="screen-orientation" content="landscape">
    <title>Ilha de Capibara - 3D Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Canvas 3D -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD - Interface do Jogo -->
    <div id="hud">
            <!-- Overlay: Rotacionar para modo paisagem -->
            <div id="rotateDeviceOverlay">
                <div id="rotateDeviceMsg">
                    📱 Gire o celular para jogar!
                </div>
            </div>

            <!-- Painel de Códigos (esquerda) -->
            <div id="commandList">
                <div id="commandListHeader" onclick="document.getElementById('commandList').classList.toggle('collapsed')">
                    🎮 Códigos <span>▼</span>
                </div>
                <div id="commandListBody">
                    <div class="cmd-row"><span class="cmd-code">65395</span><span class="cmd-desc">Nube ☁️</span></div>
                    <div class="cmd-row"><span class="cmd-code">0762</span><span class="cmd-desc">c00lkidd 😎</span></div>
                    <div class="cmd-row"><span class="cmd-code">77</span><span class="cmd-desc">Capivara 🐹</span></div>
                    <div class="cmd-row"><span class="cmd-code">888</span><span class="cmd-desc">Guarda 👮</span></div>
                    <div class="cmd-row"><span class="cmd-code">;fly</span><span class="cmd-desc">Voar ✈️</span></div>
                    <div class="cmd-row"><span class="cmd-code">456</span><span class="cmd-desc">HD Voador 🛸</span></div>
                    <div class="cmd-row cmd-owner"><span class="cmd-code">21120</span><span class="cmd-desc">Martelo 🔨👑</span></div>
                    <div class="cmd-hint">Pressione <b>C</b> e digite</div>
                </div>
            </div>
        <!-- Nome do Jogador -->
        <div id="playerNameContainer">
            <input type="text" id="playerNameInput" placeholder="Digite seu nome..." maxlength="20">
            <button id="playerNameBtn">Entrar</button>
        </div>

        <!-- Status -->
        <div id="statusContainer">
            <div id="playerName">Capibara Exploradora</div>
            <div id="statusInfo">
                <span>Vôo: <span id="flyStatus">OFF</span></span>
                <span>Transformação: <span id="transformStatus">Normal</span></span>
            </div>
        </div>

        <!-- Controles -->
        <div id="controlsInfo">
            <div class="controls-pc">PC: WASD (Mover) | ESPAÇO (Pular) | C (Chat)</div>
            <div class="controls-mobile" style="display:none;">Toque e arraste para mover</div>
        </div>

        <!-- Chat e Sistema de Códigos -->
        <div id="chatContainer">
            <div id="chatMessages"></div>
            <div id="chatInput">
                <input type="text" id="codeInput" placeholder="Digite código ou mensagem..." maxlength="50">
                <button id="codeBtn">Enviar</button>
            </div>
        </div>

        <!-- Joystick Virtual (Mobile) -->
        <div id="joystickContainer" style="display:none;">
            <div id="joystick">
                <div id="joystickKnob"></div>
            </div>
                <button id="jumpBtnMobile" onclick="window._gameJump && window._gameJump()">PULAR</button>
        </div>

        <!-- Atalhos -->
        <div id="shortcuts">
            <button id="emoteBtn">😂 Emote</button>
            <button id="flyBtn" style="display:none;">✈️ Voar</button>
            <button id="mortisBtn">🤸 Mortal</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/game.js"></script>
    <script src="js/player.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/map.js"></script>
    <script src="js/npc.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
